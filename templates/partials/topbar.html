<header class="bg-gray-900/80 border-b border-gray-800 px-6 py-4 flex justify-between items-center">

  <!-- Search -->
  <div class="relative w-64 hidden md:block">
    <input type="text" placeholder="Chercher une compétence..."
           class="w-full bg-gray-800 text-sm text-white placeholder-gray-500 rounded-full pl-10 pr-4 py-2 border border-gray-700 focus:outline-none focus:border-brandMain focus:ring-1 focus:ring-brandMain transition-all">
    <svg class="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
    </svg>
  </div>

  <!-- Profil & Notifications -->
  <div class="flex items-center gap-4 ml-auto">

    <!-- Cloche notifications -->
    <button class="relative p-2 text-gray-400 hover:text-white transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
      </svg>
      <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border border-gray-900"></span>
    </button>

    <!-- Avatar cliquable → Profil -->
    <a href="{% url 'accounts:profile' %}"
       class="flex items-center gap-3 pl-4 border-l border-gray-700 hover:opacity-80 transition-opacity">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-medium text-white">{{ request.user.username }}</p>
        <p class="text-xs text-brandGlow">{{ request.user.profile.level_display }}</p>
      </div>
      <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brandMain to-brandGlow flex items-center justify-center text-white font-bold border-2 border-gray-800">
        {{ request.user.username|make_list|first|upper }}
      </div>
    </a>

    <!-- Bouton Déconnexion -->
    <a href="{% url 'accounts:logout' %}"
       class="p-2 text-gray-500 hover:text-red-400 transition-colors"
       title="Se déconnecter">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
      </svg>
    </a>

  </div>

</header>
