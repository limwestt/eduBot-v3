<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — EduBot V3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brandMain: '#6c63ff', brandGlow: '#a78bfa', brandDark: '#0f0f1a' }}}
    }
  </script>
</head>
<body class="bg-brandDark text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="w-14 h-14 rounded-2xl bg-brandMain flex items-center justify-center font-extrabold text-2xl text-white mx-auto mb-4">E</div>
      <h1 class="text-3xl font-extrabold">EduBot <span class="text-brandGlow">V3</span></h1>
      <p class="text-gray-400 mt-2 text-sm">Connecte-toi pour continuer ta progression</p>
    </div>

    <!-- Messages d'erreur -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm {% if message.tags == 'error' %}bg-red-900/40 border border-red-700/50 text-red-300{% else %}bg-green-900/40 border border-green-700/50 text-green-300{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Formulaire -->
    <form method="POST" class="bg-gray-900 border border-gray-800 rounded-2xl p-8 space-y-5">
      {% csrf_token %}
      
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Nom d'utilisateur</label>
        <input type="text" name="username" required autofocus
               class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brandMain focus:ring-1 focus:ring-brandMain transition-all"
               placeholder="Ton nom d'utilisateur">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Mot de passe</label>
        <input type="password" name="password" required
               class="w-full bg-gray-800 border border-gray-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-brandMain focus:ring-1 focus:ring-brandMain transition-all"
               placeholder="••••••••">
      </div>

      <button type="submit"
              class="w-full bg-brandMain hover:bg-brandMain/80 text-white py-3 rounded-xl font-semibold text-sm transition-all duration-300">
        Se connecter
      </button>
    </form>

    <p class="text-center text-gray-500 text-sm mt-6">
      Pas encore de compte ?
      <a href="{% url 'accounts:register' %}" class="text-brandGlow hover:text-white font-medium transition-colors">S'inscrire</a>
    </p>

  </div>
</body>
</html>
